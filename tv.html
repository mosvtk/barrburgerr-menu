<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BARR BURGERR TV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --accent-color: #e53935;
            --text-main: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Arial Black', Gadget, sans-serif;
            overflow: hidden; height: 100%;
        }

        .tv-layout {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 позиции на экран */
            gap: 20px;
            padding: 40px;
            height: 80vh;
            align-content: center;
        }

        header {
            height: 15vh;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 5px solid var(--accent-color);
            background: #050505;
        }

        h1 { font-size: 4rem; letter-spacing: 10px; margin: 0; }

        .promo-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 2px solid #222;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 1s ease-in-out;
            opacity: 0;
            transform: scale(0.9);
        }

        .promo-card.show {
            opacity: 1;
            transform: scale(1);
        }

        .beer-img {
            height: 350px;
            object-fit: contain;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(229, 57, 53, 0.4));
        }

        .beer-name { font-size: 2.2rem; margin-bottom: 10px; line-height: 1.1; height: 2.2em; overflow: hidden; }
        .beer-price { font-size: 3rem; color: var(--accent-color); font-weight: 900; }
        .beer-stats { font-size: 1.2rem; background: var(--accent-color); color: #000; display: inline-block; padding: 5px 15px; border-radius: 10px; margin-top: 10px; }

        .footer-note {
            height: 5vh;
            text-align: center;
            color: #444;
            font-size: 1.2rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>
    <h1>BARR BURGERR</h1>
</header>

<div class="tv-layout" id="tv-content">
    </div>

<div class="footer-note">Сегодня в нашей коллекции более 70 сортов крафта</div>

<script>
    let allBeers = [];

    // Загрузка данных
    fetch('data.xlsx')
        .then(res => res.arrayBuffer())
        .then(ab => {
            const data = new Uint8Array(ab);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rawData = XLSX.utils.sheet_to_json(sheet);
            
            // Фильтруем только реальное пиво (где есть цена)
            allBeers = rawData.filter(item => {
                const p = item['Цена'] || item['цена'];
                return p && p > 0;
            });

            updateTV(); // Первый запуск
            setInterval(updateTV, 15000); // Смена каждые 15 секунд
        });

    function updateTV() {
        const container = document.getElementById('tv-content');
        container.innerHTML = '';
        
        // Берем 3 случайных позиции
        const shuffled = [...allBeers].sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, 3);

        selected.forEach((beer, index) => {
            const name = (beer['Наименование'] || '').replace('Пиво ', '').replace('Медовуха ', '');
            const price = (beer['Цена'] || beer['цена']) + ' ₽';
            const images = beer['Изображения'] || '';
            const firstImg = images.trim().split(/\s+/)[0];
            const desc = beer['Описание'] || '';
            const statsMatch = desc.match(/\d+(\.\d+)?%\s?ABV|\d+\s?IBU/gi);

            const card = document.createElement('div');
            card.className = 'promo-card';
            card.innerHTML = `
                <img src="${firstImg}" class="beer-img" onerror="this.src='https://via.placeholder.com/300x400?text=BARR+BURGERR'">
                <div>
                    <div class="beer-name">${name}</div>
                    <div class="beer-price">${price}</div>
                    ${statsMatch ? `<div class="beer-stats">${statsMatch.join(' | ')}</div>` : ''}
                </div>
            `;
            container.appendChild(card);
            
            // Плавное появление с задержкой
            setTimeout(() => card.classList.add('show'), index * 200);
        });
    }
</script>

</body>
</html>
