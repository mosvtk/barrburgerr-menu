<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BARR BURGERR TV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; } /* Это важно: отступы теперь внутри блока */
        
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --accent-color: #e53935;
            --text-main: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Arial Black', sans-serif;
            overflow: hidden; height: 100vh;
        }

        header {
            height: 12vh;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 4px solid var(--accent-color);
        }

        h1 { font-size: 3rem; letter-spacing: 5px; margin: 0; }

        .tv-layout {
            height: 78vh; /* Оставшееся место */
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px; /* Уменьшили зазоры */
            padding: 20px; /* Уменьшили отступы */
            align-content: center;
        }

        .promo-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 2px solid #222;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 1s ease-in-out;
            opacity: 0;
            transform: scale(0.9);
            overflow: hidden; /* Чтобы ничего не вылезало */
        }

        .promo-card.show { opacity: 1; transform: scale(1); }

        .beer-img {
            height: 250px; /* Сделали картинки чуть меньше */
            object-fit: contain;
            margin-bottom: 10px;
        }

        .beer-name { font-size: 1.6rem; margin-bottom: 5px; line-height: 1.1; max-height: 3.3em; overflow: hidden; }
        .beer-price { font-size: 2.2rem; color: var(--accent-color); font-weight: 900; }
        .beer-stats { font-size: 1rem; background: var(--accent-color); color: #000; display: inline-block; padding: 3px 10px; border-radius: 8px; margin-top: 5px; }

        .footer-note {
            height: 10vh;
            text-align: center;
            color: #444;
            font-size: 1rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<header><h1>BARR BURGERR</h1></header>

<div class="tv-layout" id="tv-content"></div>

<div class="footer-note">Более 70 сортов крафта</div>

<script>
    let allBeers = [];
    fetch('data.xlsx')
        .then(res => res.arrayBuffer())
        .then(ab => {
            const data = new Uint8Array(ab);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rawData = XLSX.utils.sheet_to_json(sheet);
            allBeers = rawData.filter(item => (item['Цена'] || item['цена']) && (item['Цена'] || item['цена']) > 0);
            updateTV();
            setInterval(updateTV, 15000);
        });

    function updateTV() {
        const container = document.getElementById('tv-content');
        container.innerHTML = '';
        const selected = [...allBeers].sort(() => 0.5 - Math.random()).slice(0, 3);

        selected.forEach((beer, index) => {
            const name = (beer['Наименование'] || '').replace('Пиво ', '').replace('Медовуха ', '');
            const price = (beer['Цена'] || beer['цена']) + ' ₽';
            const img = (beer['Изображения'] || '').trim().split(/\s+/)[0];
            const desc = beer['Описание'] || '';
            const stats = desc.match(/\d+(\.\d+)?%\s?ABV|\d+\s?IBU/gi);

            const card = document.createElement('div');
            card.className = 'promo-card';
            card.innerHTML = `
                <img src="${img}" class="beer-img" onerror="this.src='https://via.placeholder.com/200x250?text=BARR'">
                <div>
                    <div class="beer-name">${name}</div>
                    <div class="beer-price">${price}</div>
                    ${stats ? `<div class="beer-stats">${stats.join(' | ')}</div>` : ''}
                </div>
            `;
            container.appendChild(card);
            setTimeout(() => card.classList.add('show'), index * 200);
        });
    }
</script>
</body>
</html>
